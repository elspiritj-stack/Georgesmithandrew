<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMF Verification</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 90%;
    max-width: 420px;
}

/* Header */
.header {
    margin-bottom: 20px;
}

/* Logo */
.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.seal {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: radial-gradient(circle, #1e3c72, #2a5298);
    position: relative;
}

.seal::after {
    content: "";
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border: 2px solid white;
    border-radius: 50%;
}

.logo-text .main {
    font-size: 18px;
    font-weight: bold;
}

.logo-text .sub {
    font-size: 11px;
    opacity: 0.7;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: #28a745;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* Progress */
.progress {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
    margin-top: 15px;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff88;
}

/* Logs */
.logs {
    margin-top: 15px;
    font-size: 13px;
    height: 120px;
    overflow: hidden;
    display: none;
}

/* Success */
.success {
    display: none;
    text-align: center;
    margin-top: 20px;
}

.checkmark {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 4px solid #00ff88;
    margin: auto;
    position: relative;
}

.checkmark::after {
    content: "";
    position: absolute;
    left: 20px;
    top: 18px;
    width: 15px;
    height: 30px;
    border: solid #00ff88;
    border-width: 0 4px 4px 0;
    transform: rotate(45deg);
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <div class="seal"></div>
            <div class="logo-text">
                <div class="main">IMF VERIFICATION</div>
                <div class="sub">Secure Financial Authentication Portal</div>
            </div>
        </div>
    </div>

    <!-- INPUTS -->
    <input type="text" id="code" placeholder="Enter code">
    <input type="text" id="wallet" placeholder="Enter wallet address">

    <button id="btn" onclick="start()">Verify</button>

    <!-- PROGRESS -->
    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <!-- LOGS -->
    <div class="logs" id="logs"></div>

    <!-- SUCCESS -->
    <div class="success" id="success">
        <div class="checkmark"></div>
        <p>Verification Successful</p>
    </div>

</div>

<script>
function start() {
    let code = document.getElementById("code").value;
    let wallet = document.getElementById("wallet").value;

    if (!code || !wallet) {
        alert("Fill all fields");
        return;
    }

    let btn = document.getElementById("btn");
    btn.innerText = "Processing...";
    btn.disabled = true;

    document.querySelector(".progress").style.display = "block";
    document.getElementById("logs").style.display = "block";

    let logs = [
        "Connecting to secure server...",
        "Encrypting data...",
        "Validating code...",
        "Checking blockchain...",
        "Analyzing wallet...",
        "Running security checks...",
        "Finalizing verification..."
    ];

    let logBox = document.getElementById("logs");
    let bar = document.getElementById("bar");

    let i = 0;
    let progress = 0;

    let logInterval = setInterval(() => {
        if (i < logs.length) {
            let p = document.createElement("div");
            p.innerText = logs[i];
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
            i++;
        }
    }, 3000);

    let progressInterval = setInterval(() => {
        progress += 3;
        bar.style.width = progress + "%";
    }, 1000);

    setTimeout(() => {
        clearInterval(logInterval);
        clearInterval(progressInterval);

        document.querySelector(".progress").style.display = "none";
        document.getElementById("logs").style.display = "none";
        btn.style.display = "none";

        document.getElementById("success").style.display = "block";
    }, 30000);
}
</script>

</body>
</html>
