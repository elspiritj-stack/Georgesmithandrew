<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo Wallet UI</title>

<style>
  body { margin:0; font-family: Arial; background:#0b0f14; color:#fff; }
  .container { padding:15px; }
  .card { background:#121821; padding:15px; border-radius:12px; margin-bottom:15px; }
  .big { font-size:30px; font-weight:bold; }
  .green { color:#00ff99; }
  .red { color:#ff4d4d; }
  .muted { color:#9aa4b2; }
  .tx { background:#121821; padding:12px; border-radius:10px; margin-bottom:10px; cursor:pointer; }
  .modal {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.9); display:none;
  }
  .modal-content {
    background:#121821; margin:15px; padding:15px;
    border-radius:12px; max-height:90%; overflow:auto;
  }
  .btn {
    background:#00c853; padding:12px; text-align:center;
    border-radius:10px; font-weight:bold;
  }
  .badge {
    display:inline-block; padding:4px 8px; border-radius:6px;
    background:#243041; color:#9bd; font-size:12px;
  }
</style>
</head>

<body>

<div class="container">

  <!-- TRUST NOTICE -->
  <div class="card" style="background:#1c2430;">
    <b>trust wallet</b><br>
    <span class="red">kindly top your gas balance with $400 to complete transfers
All withdrawals will be refunded due to insufficient gas.</span>
  </div>

  <!-- WALLET -->
  <div class="card">
    <b>George Smith · China Wallet</b>
    <div class="big">¥55,913.35</div>
    <div class="muted">Wallet Address:</div>
    <small>31msxbstHS3oQibXcsHun2aA6RNoyX********</small>
  </div>

  <!-- TOTAL -->
  <div class="card" style="background:linear-gradient(90deg,#00c853,#004d40); text-align:center;">
    <div>Total Assets</div>
    <div class="big">$295,000</div>
  </div>

  <h3>Transaction Records</h3>
  <div id="list"></div>

</div>

<!-- RECEIPT -->
<div class="modal" id="modal">
  <div class="modal-content" id="receipt"></div>
</div>

<script>
const list = document.getElementById("list");
const modal = document.getElementById("modal");
const receipt = document.getElementById("receipt");

/* SPECIAL TRANSACTION */
let special = document.createElement("div");
special.className = "tx";
special.innerHTML = `
  <div style="display:flex; justify-content:space-between;">
    <span>April 2, 2026</span>
    <span class="red">-¥10,000.00</span>
  </div>
  <small class="green">Demo: reversed transaction</small>
`;
special.onclick = openSpecial;
list.appendChild(special);

/* DAILY DEPOSITS */
for(let i=1;i<=31;i++){
  let tx = document.createElement("div");
  tx.className="tx";

  tx.innerHTML = `
    <div style="display:flex; justify-content:space-between;">
      <span>March ${i}, 2026</span>
      <span class="green">+$90.00</span>
    </div>
    <small class="muted">Demo deposit</small>
  `;

  tx.onclick = () => openReceipt(i);
  list.appendChild(tx);
}

/* SPECIAL RECEIPT */
function openSpecial(){
  receipt.innerHTML = `
    <h3>Transaction Receipt <span class="badge">DEMO</span></h3>

    <h2 class="red">¥10,000.00</h2>
    <p class="green">Reversed (demo)</p>

    <p><b>Transaction number:</b> TXMNI483P4</p>
    <p><b>Collection institutions:</b> Industrial and Commercial Bank of China</p>
    <p><b>Recipient:</b> George Smith</p>

    <p><b>Receiving address:</b><br>
    31msxbstHS3oQibXcsHun2aA6RNoyX2n88</p>

    <p><b>Trading hours:</b> 2026/4/2 18:38:11</p>

    <hr>

    <p><b>Status:</b> <span class="green">Reversed </span></p>

    <div style="background:#1c2430; padding:10px; border-radius:8px;">
      This is a UI demonstration of a reversed transaction.
    </div>

    <br>
    <div class="btn" onclick="closeModal()">Return</div>
  `;
  modal.style.display="block";
}

/* NORMAL RECEIPT */
function openReceipt(day){
  receipt.innerHTML = `
    <h3>Transaction Receipt <span class="badge">DEMO</span></h3>

    <p class="green">+$90.00 Demo Deposit</p>

    <p><b>Transaction number:</b> TX${day}93821A</p>
    <p><b>Recipient:</b> George Smith</p>

    <p><b>Receiving address:</b><br>
    31msxbstHS3oQibXcsHun2aA6RNoyX2n88</p>

    <p><b>Date:</b> March ${day}, 2026</p>

    <hr>

    <p><b>Status:</b> <span class="green">Completed (demo)</span></p>

    <br>
    <div class="btn" onclick="closeModal()">Return</div>
  `;
  modal.style.display="block";
}

function closeModal(){
  modal.style.display="none";
}
</script>

</body>
</html>
